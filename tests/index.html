<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Peerix Tests</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        font-size: 16px;
        margin: 2em;
      }

      footer {
        margin-top: 3em;
        font-size: 0.9em;
        color: #555;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 20px;
      }

      th,
      td {
        border: 1px solid #ccc;
        padding: 8px;
        text-align: left;
      }

      th {
        background-color: #f4f4f4;
      }
    </style>
  </head>

  <body>
    <h1>Peerix Tests</h1>

    <table id="tests">
      <thead>
        <tr>
          <th>#</th>
          <th>Test Name</th>
          <th>Status</th>
          <th>Duration</th>
          <th>Details</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="tests-body"></tbody>
    </table>

    <footer>
      <hr />
      <p>&copy; <a href="https://peerix.dev" target="_blank">peerix.dev</a></p>
    </footer>

    <template id="test-row-template">
      <tr>
        <td class="test-number"></td>
        <td class="test-name"></td>
        <td class="test-status"></td>
        <td class="test-duration"></td>
        <td class="test-details"></td>
        <td><button class="run-btn">Run</button></td>
      </tr>
    </template>

    <script type="module">
      import { TestRunner } from "./runner.js";
      import scenario from "./scenario.js";

      for (const testCase of scenario) {
        renderTest({
          id: testCase.id,
          title: testCase.title,
          runTest: async () => {
            console.log(`Running test: [${testCase.id}] ${testCase.title}`);
            const runner = new TestRunner({ debug: "peerix:*" });
            await runner.run(testCase);
          },
        });
      }

      function renderTest({ id, title, status, duration, details, runTest }) {
        const template = document.getElementById("test-row-template");
        const clone = template.content.cloneNode(true);
        const testId = id;
        const row = clone.querySelector("tr");
        const statusCell = clone.querySelector(".test-status");
        const durationCell = clone.querySelector(".test-duration");
        const detailsCell = clone.querySelector(".test-details");
        const runBtn = clone.querySelector(".run-btn");

        row.classList.add(`test-${testId}`);
        clone.querySelector(".test-number").textContent = testId;
        clone.querySelector(".test-name").textContent = title;
        statusCell.textContent = "-";
        durationCell.textContent = "-";
        detailsCell.textContent = "-";

        runBtn.addEventListener("click", async () => {
          runBtn.disabled = true;
          const startTime = performance.now();
          try {
            statusCell.textContent = "Running...";
            await runTest();
            const duration = ((performance.now() - startTime) / 1000).toFixed(
              2,
            );
            statusCell.textContent = "✓ Passed";
            statusCell.style.color = "green";
            durationCell.textContent = `${duration}s`;
          } catch (error) {
            const duration = ((performance.now() - startTime) / 1000).toFixed(
              2,
            );
            statusCell.textContent = "✗ Failed";
            statusCell.style.color = "red";
            durationCell.textContent = `${duration}s`;
            detailsCell.textContent = error.message || "Error";
          } finally {
            runBtn.disabled = false;
          }
        });

        const body = document.getElementById("tests-body");
        const existingRow = body.querySelector(`.test-${testId}`);
        if (existingRow) {
          body.replaceChild(clone, existingRow);
        } else {
          body.appendChild(clone);
        }
      }

      // for Playwright tests
      window.TestRunner = TestRunner;
    </script>
  </body>
</html>
