<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    .container {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    video {
      width: 160px;
      height: 90px;
      border: 1px solid #ccc;
      background-color: #333;
    }

    #streams {
      display: flex;
      gap: 0.5rem;
    }

    #streams:empty::before {
      content: 'No streams';
      color: #888;
    }

    #events {
      border: 1px solid #ccc;
      height: 200px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 0.9em;
      scroll-behavior: smooth;
    }
  </style>
</head>

<body>
  <h1>Peer Example</h1>

  <div class="container">
    <label>
      <legend>Room</legend>
      <input type="text" id="room" placeholder="Room ID" value="demo" />
      <button id="join">Join</button>
      <button id="leave">Leave</button>
    </label>

    <label>
      <legend>Channels</legend>
      <input id="channel" placeholder="label" value="default" />
      <button id="open">Open</button>
      <button id="close">Close</button>
    </label>

    <label>
      <legend>Messages</legend>
      <input id="message" placeholder="text" />
      <input id="send-channel" placeholder="label" value="default" />
      <button id="send">Send</button>
    </label>

    <label>
      <legend>Streams</legend>
      <button id="publish">Publish</button>
      <button id="unpublish">Unpublish</button>
      <button id="audio-only">Audio Only</button>
      <button id="video-only">Video Only</button>
    </label>

    <label>
      <legend>Remote Streams</legend>
      <div id="streams"></div>
    </label>

    <label>
      <legend>Events</legend>
      <div id="events"></div>
    </label>
  </div>

  <script type="module">
    import { Peer, BroadcastChannelDriver } from 'peerix';

    const driver = new BroadcastChannelDriver('peerix-demo');

    const peer = new Peer({ driver });

    const events = document.getElementById('events');
    const log = (message) => {
      const el = document.createElement('div');
      el.textContent = message;
      events.appendChild(el);
      events.scrollTop = events.scrollHeight;
    };
    const streams = document.getElementById('streams');
    const addStream = (stream) => {
      const video = document.getElementById(stream.id)
        || document.createElement('video');
      video.srcObject = stream;
      video.autoplay = true;
      video.playsInline = true;
      video.id = stream.id;
      streams.appendChild(video);
    };
    const removeStream = (stream) => {
      const video = document.getElementById(stream.id);
      if (video) {
        streams.removeChild(video);
      }
    };

    peer.on('state', (e) => {
      const { remote, state } = e;
      log(`event: state, peer: ${remote.id}, state: ${state}`);
    });

    peer.on('error', (e) => {
      const { remote, channel, error, code } = e;
      log(`event: error, peer: ${remote?.id}, channel: ${channel?.label}, code: ${code}, error: ${error.message}`);
    });

    peer.on('open', (e) => {
      const { remote, channel } = e;
      log(`event: open, peer: ${remote.id}, channel: ${channel.label}`);
    });

    peer.on('close', (e) => {
      const { remote, channel } = e;
      log(`event: close, peer: ${remote.id}, channel: ${channel.label}`);
    });

    peer.on('message', (e) => {
      const { remote, channel, data } = e;
      log(`event: message, peer: ${remote.id}, channel: ${channel.label}, data: ${data}`);
    });

    peer.on('publish', (e) => {
      const { remote, stream, track } = e;
      log(`event: publish, peer: ${remote.id}, track: ${track.kind} ${track.id}, stream: ${stream.id}`);
      addStream(stream);
    });

    peer.on('unpublish', (e) => {
      const { remote, stream, track } = e;
      log(`event: unpublish, peer: ${remote.id}, track: ${track.kind} ${track.id}, stream: ${stream.id}`);
      const isEmpty = !stream.getTracks().length;
      if (isEmpty) removeStream(stream);
    });

    const joinButton = document.getElementById('join');
    joinButton.addEventListener('click', () => {
      const room = document.getElementById('room').value;
      if (room) peer.join({ room });
    });

    const leaveButton = document.getElementById('leave');
    leaveButton.addEventListener('click', () => {
      peer.leave();
    });

    const openButton = document.getElementById('open');
    openButton.addEventListener('click', () => {
      const label = document.getElementById('channel').value;
      if (label) peer.open({ label });
    });

    const closeButton = document.getElementById('close');
    closeButton.addEventListener('click', () => {
      const label = document.getElementById('channel').value;
      if (label) peer.close({ label });
    });

    const sendButton = document.getElementById('send');
    sendButton.addEventListener('click', () => {
      const label = document.getElementById('send-channel').value;
      const message = document.getElementById('message').value;
      if (label) peer.send(message, { label });
      else peer.send(message);
    });

    const publishButton = document.getElementById('publish');
    publishButton.addEventListener('click', async () => {
      const stream = createSyntheticMediaStream({ video: true, audio: true });
      peer.publish({ label: 'default', stream, managed: true });
    });

    const unpublishButton = document.getElementById('unpublish');
    unpublishButton.addEventListener('click', () => {
      peer.unpublish({ label: 'default' });
    });

    const audioOnlyButton = document.getElementById('audio-only');
    audioOnlyButton.addEventListener('click', async () => {
      const stream = createSyntheticMediaStream({ video: false, audio: true });
      peer.publish({ label: 'default', stream, managed: true });
    });

    const videoOnlyButton = document.getElementById('video-only');
    videoOnlyButton.addEventListener('click', async () => {
      const stream = createSyntheticMediaStream({ video: true, audio: false });
      peer.publish({ label: 'default', stream, managed: true });
    });

    function createSyntheticMediaStream({ width = 640, height = 360, video = true, audio = true } = {}) {
      const tracks = [];
      let draw = () => { };

      // 1. Generate the Video Stream (using Canvas)
      if (video) {
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        if (!ctx) {
          throw new Error('Failed to create canvas context');
        }

        // Simple animation loop to make the video "active"
        draw = () => {
          ctx.fillStyle = 'black';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = 'lime';
          ctx.font = `${Math.min(canvas.width, canvas.height) * 0.08}px monospace`;
          ctx.textAlign = 'center';
          ctx.fillText(`Synthetic Feed: ${new Date().toLocaleTimeString()}`, canvas.width / 2, canvas.height / 2);
          if (syntheticStream?.active) {
            requestAnimationFrame(draw);
          }
        }

        // Capture the canvas at 15 frames per second
        const videoStream = canvas.captureStream(15);

        tracks.push(...videoStream.getVideoTracks());
      }

      // 2. Generate the Audio Stream (using Web Audio API)
      if (audio) {
        const audioCtx = new window.AudioContext();
        const oscillator = audioCtx.createOscillator();
        const dst = audioCtx.createMediaStreamDestination();

        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(440, audioCtx.currentTime); // A4 note
        oscillator.connect(dst);
        oscillator.start();

        tracks.push(...dst.stream.getAudioTracks());
      }

      // 3. Combine into a single MediaStream
      const syntheticStream = new MediaStream(tracks);

      draw();

      return syntheticStream;
    }

    window.peer = peer; // Expose peer for debugging
  </script>
</body>

</html>
